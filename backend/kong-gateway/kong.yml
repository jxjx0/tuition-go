plugins:
  - name: cors
    config:
      origins: ["http://localhost:5173"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Authorization", "Content-Type", "X-Google-Token", "X-User-Email"]
      exposed_headers: ["Authorization"]
      credentials: true
      preflight_continue: false

services:
  - name: student-service
    url: http://student:5001/student
    plugins:
      - name: jwt
        config: {key_claim_name: iss, claims_to_verify: [exp], anonymous: anonymous}
      - name: acl
        config: {allow: [authenticated], hide_groups_header: true}
    routes:
      - name: student-route
        paths: [/api/v1/students]
        methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
        strip_path: true

  - name: tutor-service
    url: http://tutor:5002/tutor
    plugins:
      - name: jwt
        config: {key_claim_name: iss, claims_to_verify: [exp], anonymous: anonymous}
      - name: acl
        config: {allow: [authenticated], hide_groups_header: true}
    routes:
      - name: tutor-route
        paths: [/api/v1/tutors]
        methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
        strip_path: true

  - name: session-service
    url: http://session:5003/session
    plugins:
      - name: jwt
        config: {key_claim_name: iss, claims_to_verify: [exp], anonymous: anonymous}
      - name: acl
        config: {allow: [authenticated], hide_groups_header: true}
    routes:
      - name: session-route
        paths: [/api/v1/sessions]
        methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
