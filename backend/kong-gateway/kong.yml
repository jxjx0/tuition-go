_format_version: "3.0"
_transform: true

services:
  # Atomic Services
  - name: student-service
    url: http://student:5001
    routes:
      - name: student-route
        paths:
          - /api/v1/students
        strip_path: true

  - name: tutor-service
    url: http://tutor:5002
    routes:
      - name: tutor-route
        paths:
          - /api/v1/tutors
        strip_path: true

  - name: session-service
    url: http://session:5003
    routes:
      - name: session-route
        paths:
          - /api/v1/sessions
        strip_path: true

  - name: meeting-service
    url: http://meeting:5004
    routes:
      - name: meeting-route
        paths:
          - /api/v1/meetings
        strip_path: true

  - name: calendar-service
    url: http://calendar:5005
    routes:
      - name: calendar-route
        paths:
          - /api/v1/calendar
        strip_path: true

  - name: email-service
    url: http://email:5006
    routes:
      - name: email-route
        paths:
