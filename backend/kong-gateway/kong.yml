        methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
        strip_path: true

  - name: calendar-service
    url: http://calendar:5005/calendar
    routes:
      - name: calendar-public-route
        paths: [/api/v1/calendar]
        methods: [GET, OPTIONS]
        strip_path: true
        # No security on GET (auth-status, auth-url, health)
        
      - name: calendar-protected-route
        paths: [/api/v1/calendar]
        methods: [POST, PUT, DELETE, PATCH, OPTIONS]
        strip_path: true
        plugins:
          - name: jwt
            config: {key_claim_name: iss, claims_to_verify: [exp], anonymous: anonymous}
          - name: acl
            config: {allow: [authenticated], hide_groups_header: true}

  - name: email-service
