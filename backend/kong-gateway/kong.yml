plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"   # Vite dev server
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: true
      preflight_continue: false   # Kong responds to OPTIONS itself, JWT plugin never runs

  - name: jwt
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp
      anonymous: anonymous   # no token → anonymous consumer, passes through instead of 401

services:
  # Atomic Services
  - name: student-service
    url: http://student:5001
    routes:
      - name: student-route
        paths:
          - /api/v1/students
        strip_path: true

  - name: tutor-service
