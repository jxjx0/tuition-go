services:
  # ==================== KONG GATEWAY ====================
  kong:
    build:
      context: ./kong-gateway
      dockerfile: Dockerfile
    container_name: kong-gateway
    ports:
      - "8000:8000"   # Proxy
      - "8001:8001"   # Admin API
      - "8002:8002"   # Admin GUI
    networks:
      - tuition-network
    depends_on:
      - student
      - tutor
      - session
      - calendar
      - email
      - payment
      - checkout
      - process-booking
      - create-session
      - update-session
      - delete-session
      - cancel-session
      - complete-session
      - rate-tutor
      - get-tutor
      - get-sessions
    restart: unless-stopped
  # ==================== RABBITMQ SERVICES ====================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP (your services use this)
      - "15672:15672"   # Web UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - tuition-network
    restart: unless-stopped
  # ==================== ATOMIC SERVICES ====================
  student:
    build:
      context: ./atomic/student
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: student-service
    ports:
      - "5001:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}

    networks:
      - tuition-network
    restart: unless-stopped

  tutor:
    build:
      context: ./atomic/tutor
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: tutor-service
    ports:
      - "5002:5002"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}

    networks:
      - tuition-network
    restart: unless-stopped

  session:
    build:
      context: ./atomic/session
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: session-service
    ports:
      - "5003:5003"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    networks:
      - tuition-network
    restart: unless-stopped

  calendar:
    build:
      context: ./atomic/calendar
      dockerfile: Dockerfile
    container_name: calendar-service
    environment:
      - PYTHONUNBUFFERED=1
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    ports:
      - "5005:5005"
    volumes:
      - ./atomic/calendar:/app
    networks:
      - tuition-network
    restart: unless-stopped

  email:
    build:
      context: ./atomic/email
      dockerfile: Dockerfile
    container_name: email-service
    ports:
      - "5006:5006"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - tuition-network
    restart: unless-stopped

  payment:
    build:
      context: ./atomic/payment
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: payment-service
    ports:
      - "5007:5007"
    networks:
      - tuition-network
    restart: unless-stopped

  # ==================== COMPOSITE SERVICES ====================
  checkout:
    build:
      context: ./composite/checkout
      dockerfile: Dockerfile
    container_name: checkout-service
    ports:
      - "5100:5100"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - PAYMENT_SERVICE_URL=http://payment:5007
      - STUDENT_SERVICE_URL=http://student-service:5001
    networks:
      - tuition-network
    restart: unless-stopped

  process-booking:
    build:
      context: ./composite/process_booking
      dockerfile: Dockerfile
    container_name: process-booking-service
    ports:
      - "5104:5104"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - STUDENT_SERVICE_URL=http://student:5001
      - CALENDAR_SERVICE_URL=http://calendar:5005
      - PAYMENT_SERVICE_URL=http://payment:5007
      - RABBITMQ_HOST=rabbitmq
    networks:
      - tuition-network
    restart: unless-stopped

  create-session:
    build:
      context: ./composite/create_session
      dockerfile: Dockerfile
    container_name: create-session-service
    ports:
      - "5105:5105"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - CALENDAR_SERVICE_URL=http://calendar:5005
    networks:
      - tuition-network
    restart: unless-stopped

  update-session:
    build:
      context: ./composite/update_session
      dockerfile: Dockerfile
    container_name: update-session-service
    ports:
      - "5106:5106"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - CALENDAR_SERVICE_URL=http://calendar:5005
    networks:
      - tuition-network
    restart: unless-stopped

  delete-session:
    build:
      context: ./composite/delete_session
      dockerfile: Dockerfile
    container_name: delete-session-service
    ports:
      - "5107:5107"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - CALENDAR_SERVICE_URL=http://calendar:5005
    networks:
      - tuition-network
    restart: unless-stopped

  cancel-session:
    build:
      context: ./composite/cancel_session
      dockerfile: Dockerfile
    container_name: cancel-session-service
    ports:
      - "5101:5101"
    env_file:
      - .env
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - STUDENT_SERVICE_URL=http://student:5001
      - PAYMENT_SERVICE_URL=http://payment:5007
      - CALENDAR_SERVICE_URL=http://calendar:5005
      - RABBITMQ_HOST=rabbitmq
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      - rabbitmq
    networks:
      - tuition-network
    restart: unless-stopped

  complete-session:
    build:
      context: ./composite/complete_session
      dockerfile: Dockerfile
    container_name: complete-session-service
    ports:
      - "5108:5108"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - STUDENT_SERVICE_URL=http://student:5001
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    networks:
      - tuition-network
    restart: unless-stopped

  rate-tutor:
    build:
      context: ./composite/rate_tutor
      dockerfile: Dockerfile
    container_name: rate-tutor-service
    ports:
      - "5102:5102"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - REVIEW_SERVICE_URL=https://personal-rkcavjxu.outsystemscloud.com/Review/rest/Review

    networks:
      - tuition-network
    restart: unless-stopped

  get-tutor:
    build:
      context: ./composite/get_tutor
      dockerfile: Dockerfile
    container_name: get-tutor-service
    ports:
      - "5109:5109"
    environment:
      - TUTOR_SERVICE_URL=http://tutor:5002
      - STUDENT_SERVICE_URL=http://student:5001
      - REVIEW_SERVICE_URL=https://personal-rkcavjxu.outsystemscloud.com/Review/rest/Review
    networks:
      - tuition-network
    restart: unless-stopped

  get-sessions:
    build:
      context: ./composite/get_sessions
      dockerfile: Dockerfile
    container_name: get-sessions-service
    ports:
      - "5103:5103"
    environment:
      - SESSION_SERVICE_URL=http://session:5003
      - TUTOR_SERVICE_URL=http://tutor:5002
      - STUDENT_SERVICE_URL=http://student:5001
      - REVIEW_SERVICE_URL=https://personal-rkcavjxu.outsystemscloud.com/Review/rest/Review
    networks:
      - tuition-network
    restart: unless-stopped

networks:
  tuition-network:
    driver: bridge

volumes:
  rabbitmq_data:
    name: tuitiongo_rabbitmq_data